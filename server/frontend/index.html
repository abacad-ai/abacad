<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f7" />
    <meta name="theme-color" content="#0b0b0d" />
    <meta
      name="description"
      content="Connect a phone, laptop, or browser as a device and let your coding agent drive it over one MCP endpoint — you approve every step."
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <script>
      // Stamp a forced theme before first paint so there is no flash of the
      // wrong scheme; no stored value means auto (follow the system).
      try {
        var t = localStorage.getItem("abacad-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <title>abacad · Connect any device to your coding agent</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
