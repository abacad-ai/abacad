<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>abacad browser device</title>
<style>
  /* The page itself is the device surface — one document, no iframe. A screen
     pixel (x, y) maps 1:1 to the captured screenshot and to injected coordinates,
     the same invariant the Android and macOS clients hold. Content the agent
     builds lives in this same document, so scripting and screenshot always work
     same-origin. There is no way back from a top-level navigation: leaving this
     page unloads the client and drops the device until someone reopens it. */
  html, body { margin: 0; min-height: 100%; }
  body { font: 16px system-ui; color: #333; background: #fff; }
  #ready { display: grid; place-items: center; height: 100vh; text-align: center; }
  #ready h1 { margin: 0 0 .3em; }
  #ready p { color: #888; }

  /* The abacad UI (awareness badge + first-connect toast) lives in its own
     container so it can be re-attached whenever the agent wipes document.body —
     it is the consent surface for whoever is looking at this tab, so it must
     survive content rewrites. High z-index, its own stacking context. */
  #abacad-ui { position: fixed; inset: 0; pointer-events: none; z-index: 2147483647;
    font: 12px/1.4 system-ui; }
  #abacad-ui > * { pointer-events: auto; }
  .abacad-badge { position: fixed; top: 8px; right: 8px; display: flex; align-items: center;
    gap: 8px; background: rgba(11,11,13,.92); color: #f2f2f4; border-radius: 999px;
    padding: 5px 8px 5px 11px; box-shadow: 0 4px 14px rgba(0,0,0,.35); }
  .abacad-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff9f0a;
    box-shadow: 0 0 0 3px rgba(48,209,88,.18); transition: background .2s; }
  .abacad-badge b { font-weight: 600; }
  .abacad-btn { border: none; cursor: pointer; font: 600 11px system-ui; color: #f2f2f4;
    background: rgba(255,255,255,.12); border-radius: 999px; padding: 3px 9px; }
  .abacad-btn:hover { background: rgba(255,255,255,.2); }
  .abacad-danger { background: #ff453a; color: #fff; }
  .abacad-danger:hover { background: #e0342b; }
  .abacad-toast { position: fixed; left: 8px; bottom: 8px; max-width: 300px;
    background: rgba(11,11,13,.94); color: #f2f2f4; border-radius: 10px; padding: 10px 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,.4); display: none; }
  .abacad-toast a { color: #ff8a80; font-weight: 600; text-decoration: none; }
</style>
<!-- Pixel capture. The DOM tree (below) is the primary semantic layer; this is
     the escape hatch for pixels. Served same-origin (vendored, not a CDN) so it
     works on locked-down networks. -->
<script src="/_hc.js"></script>
</head>
<body>
<div id="ready"><h1>abacad browser device</h1>
<p>Connected. An agent can now build and drive content here.</p></div>
<script>
(() => {
  "use strict";
  // This page is served from the device's own subdomain (<device-id>.abacad.ai);
  // the id in the Host is what authenticates the connection, so we dial /device
  // same-origin with nothing in the URL.
  const wsProto = location.protocol === "https:" ? "wss" : "ws";
  const wsURL = wsProto + "://" + location.host + "/device";

  // --- awareness UI (built in JS so it survives document.body rewrites) ---
  // The badge shows connection + a distinct "controlling now" state; the two
  // buttons are the on-device stop: Pause (soft-kill — stay connected, reject
  // commands locally) and Disconnect (drop the socket for good). None of this is
  // in the served HTML, so a full content rewrite can't remove the consent
  // surface — ensureUI() re-attaches it.
  let paused = false, closed = false, controlling = false, ctrlTimer = 0, toastShown = false;

  const ui = document.createElement("div"); ui.id = "abacad-ui";
  const badge = document.createElement("div"); badge.className = "abacad-badge";
  const dot = document.createElement("span"); dot.className = "abacad-dot";
  const label = document.createElement("b"); label.textContent = "abacad";
  const pauseBtn = document.createElement("button"); pauseBtn.className = "abacad-btn"; pauseBtn.textContent = "Pause";
  const discBtn = document.createElement("button"); discBtn.className = "abacad-btn abacad-danger"; discBtn.textContent = "Disconnect";
  badge.append(dot, label, pauseBtn, discBtn);
  const toast = document.createElement("div"); toast.className = "abacad-toast";
  ui.append(badge, toast);

  pauseBtn.addEventListener("click", () => { paused = !paused; render(); });
  discBtn.addEventListener("click", () => disconnect());

  function disconnect() {
    closed = true;
    try { if (ws) ws.close(); } catch (e) { /* ignore */ }
    toast.style.display = "none";
    render();
  }

  function ensureUI() {
    if (!ui.isConnected && document.body) document.body.appendChild(ui);
  }

  function render() {
    ensureUI();
    const open = ws && ws.readyState === 1 && !closed;
    let state, color;
    if (closed) { state = "disconnected"; color = "#66666c"; }
    else if (!open) { state = "connecting"; color = "#ff9f0a"; }
    else if (paused) { state = "paused"; color = "#ff9f0a"; }
    else if (controlling) { state = "controlling"; color = "#30d158"; }
    else { state = "idle"; color = "#30d158"; }
    dot.style.background = color;
    label.textContent = "abacad · " + state;
    pauseBtn.textContent = paused ? "Resume" : "Pause";
    pauseBtn.style.display = closed ? "none" : "";
    discBtn.style.display = closed ? "none" : "";
  }

  // First-connect heads-up for whoever is at the tab: an agent can now drive it,
  // and here's how to stop it. Auto-dismisses; shown once.
  function showToast() {
    if (toastShown) return;
    toastShown = true;
    toast.textContent = "An agent is connected and can see and control this tab. ";
    const a = document.createElement("a");
    a.href = "#"; a.textContent = "Disconnect";
    a.addEventListener("click", (e) => { e.preventDefault(); disconnect(); });
    toast.append(a);
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 8000);
  }

  // "Controlling now" lights up on each command and decays a few seconds later.
  function noteCommand() {
    controlling = true;
    render();
    clearTimeout(ctrlTimer);
    ctrlTimer = setTimeout(() => { controlling = false; render(); }, 6000);
  }

  function vw() { return document.documentElement.clientWidth; }
  function vh() { return document.documentElement.clientHeight; }

  const inAbacadUI = (el) => el.id === "abacad-ui" || (el.closest && el.closest("#abacad-ui"));

  // --- screenshot: pixels (best-effort) + DOM-derived accessibility tree. ---
  async function capture(includeTree) {
    const w = vw(), h = vh();
    const res = { w, h, png_base64: "" };
    try {
      if (window.html2canvas) {
        const canvas = await window.html2canvas(document.documentElement, {
          logging: false, useCORS: true, backgroundColor: "#fff",
          width: w, height: h, windowWidth: w, windowHeight: h,
          ignoreElements: (el) => inAbacadUI(el), // the awareness UI isn't part of the surface
        });
        res.w = canvas.width; res.h = canvas.height;
        res.png_base64 = canvas.toDataURL("image/jpeg", 0.7).split(",")[1] || "";
      }
    } catch (e) { /* rasterize failure: tree-only, empty image */ }
    if (includeTree) res.tree = buildTree();
    return res;
  }

  const CLICKABLE = { A: 1, BUTTON: 1, INPUT: 1, SELECT: 1, TEXTAREA: 1, SUMMARY: 1, LABEL: 1 };
  function buildTree() {
    const sel = "a,button,input,textarea,select,summary,label,[role],[onclick]," +
      "h1,h2,h3,h4,p,li,td,th,[aria-label]";
    const w = vw(), h = vh();
    const nodes = [];
    document.querySelectorAll(sel).forEach((el) => {
      if (inAbacadUI(el)) return; // the awareness UI, not surface content
      const r = el.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) return;
      if (r.bottom < 0 || r.right < 0 || r.top > h || r.left > w) return;
      const role = el.getAttribute("role");
      nodes.push({
        cls: role || el.tagName,
        text: String(el.value || el.innerText || el.getAttribute("aria-label") || el.getAttribute("placeholder") || "").trim().slice(0, 200),
        id: el.id || el.getAttribute("name") || "",
        clickable: !!CLICKABLE[el.tagName] || el.hasAttribute("onclick") || role === "button" || role === "link",
        bounds: [Math.round(r.left), Math.round(r.top), Math.round(r.right), Math.round(r.bottom)],
      });
    });
    return { pkg: location.href, nodes };
  }

  // --- input injection: synthetic DOM events into this page. ---
  function clickAt(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return { dispatched: false };
    const opts = { bubbles: true, cancelable: true, clientX: x, clientY: y, view: window };
    el.dispatchEvent(new MouseEvent("mousedown", opts));
    el.dispatchEvent(new MouseEvent("mouseup", opts));
    el.dispatchEvent(new MouseEvent("click", opts));
    if (typeof el.focus === "function") el.focus();
    return { dispatched: true };
  }

  function scrollBy(x, y, dx, dy) {
    const step = 40; // wheel line -> px
    // Scroll the element under the point if it scrolls, else the whole page.
    const el = document.elementFromPoint(x, y);
    if (el && typeof el.scrollBy === "function") el.scrollBy((dx || 0) * step, (dy || 0) * step);
    else window.scrollBy((dx || 0) * step, (dy || 0) * step);
    return { dispatched: true };
  }

  function inputText(text) {
    const el = document.activeElement;
    if (el && ("value" in el)) {
      el.value = text;
      el.dispatchEvent(new Event("input", { bubbles: true }));
      el.dispatchEvent(new Event("change", { bubbles: true }));
      return { set: true };
    }
    return { set: false };
  }

  // --- execute: run JS in this page's own realm, so `document`/`location`/`window`
  // are the device page's. It always has full control because it runs here — but
  // `location.href = …` (or any code that navigates) unloads the client for good. ---
  const AsyncFn = (async function () {}).constructor;
  async function execute(code) {
    const fn = new AsyncFn(code);      // globals resolve to this page's window
    const value = await fn.call(window);
    return { value: value === undefined ? null : value };
  }

  const handlers = {
    screenshot: (p) => capture(p ? p.include_ui_tree !== false : true),
    tap: (p) => clickAt(p.x, p.y),
    click: (p) => clickAt(p.x, p.y),
    scroll: (p) => scrollBy(p.x, p.y, p.dx, p.dy),
    input_text: (p) => inputText(p.text),
    execute: (p) => execute(p.code || ""),
  };

  // --- relay connection: dial, dispatch commands, reply, reconnect. ---
  let ws = null;
  function connect() {
    if (closed) return;
    ws = new WebSocket(wsURL);
    ws.addEventListener("open", () => { render(); showToast(); });
    ws.addEventListener("close", () => { render(); if (!closed) setTimeout(connect, 1000); });
    ws.addEventListener("error", () => {});
    ws.addEventListener("message", async (ev) => {
      let cmd;
      try { cmd = JSON.parse(ev.data); } catch (e) { return; }
      ensureUI(); // a prior content rewrite may have removed it
      // Soft-kill: while paused, reject every command locally. The agent sees an
      // error; only the badge's Resume clears it.
      if (paused) {
        ws.send(JSON.stringify({ id: cmd.id, ok: false, error: "paused by device operator" }));
        return;
      }
      const fn = handlers[cmd.method];
      if (!fn) { ws.send(JSON.stringify({ id: cmd.id, ok: false, error: "unknown method " + cmd.method })); return; }
      noteCommand();
      try {
        const result = await fn(cmd.params || {});
        ws.send(JSON.stringify({ id: cmd.id, ok: true, result }));
      } catch (e) {
        ws.send(JSON.stringify({ id: cmd.id, ok: false, error: String((e && e.message) || e) }));
      }
    });
  }

  render();
  connect();
})();
</script>
</body>
</html>
